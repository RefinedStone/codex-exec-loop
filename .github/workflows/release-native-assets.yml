name: Release Native Assets

on:
  push:
    tags:
      - "*"

permissions:
  contents: write

concurrency:
  group: release-native-assets-${{ github.ref }}
  cancel-in-progress: false

env:
  CARGO_TERM_COLOR: always

jobs:
  build-native-assets:
    name: Build ${{ matrix.label }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            label: linux-x86_64
          - runner: windows-latest
            target: x86_64-pc-windows-msvc
            label: windows-x86_64
          - runner: macos-14
            target: aarch64-apple-darwin
            label: macos-aarch64
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Build distributable bundle
        id: package
        shell: bash
        run: |
          set -euo pipefail

          output="$(bash scripts/package_native_release.sh --target "${{ matrix.target }}")"
          printf '%s\n' "${output}"

          archive="$(printf '%s\n' "${output}" | sed -n 's/^archive=//p')"
          archive_checksum="$(printf '%s\n' "${output}" | sed -n 's/^archive_checksum=//p')"
          bundle_dir="$(printf '%s\n' "${output}" | sed -n 's/^bundle_dir=//p')"
          archive_upload="${archive}"
          archive_checksum_upload="${archive_checksum}"

          for required_path in "${archive}" "${archive_checksum}" "${bundle_dir}"; do
            if [[ -z "${required_path}" || ! -e "${required_path}" ]]; then
              echo "Expected release artifact was not created: ${required_path}" >&2
              exit 1
            fi
          done

          if [[ "${RUNNER_OS}" == "Windows" ]] && command -v cygpath >/dev/null 2>&1; then
            archive_upload="$(cygpath -m "${archive}")"
            archive_checksum_upload="$(cygpath -m "${archive_checksum}")"
          fi

          printf 'archive=%s\n' "${archive}" >> "${GITHUB_OUTPUT}"
          printf 'archive_checksum=%s\n' "${archive_checksum}" >> "${GITHUB_OUTPUT}"
          printf 'bundle_dir=%s\n' "${bundle_dir}" >> "${GITHUB_OUTPUT}"
          printf 'archive_upload=%s\n' "${archive_upload}" >> "${GITHUB_OUTPUT}"
          printf 'archive_checksum_upload=%s\n' "${archive_checksum_upload}" >> "${GITHUB_OUTPUT}"

      - name: Verify packaged bundle
        shell: bash
        run: |
          set -euo pipefail

          bash scripts/verify_native_release.sh \
            --archive "${{ steps.package.outputs.archive }}" \
            --bundle-dir "${{ steps.package.outputs.bundle_dir }}"

      - name: Upload release payload
        uses: actions/upload-artifact@v4
        with:
          name: native-release-${{ matrix.label }}
          if-no-files-found: error
          path: |
            ${{ steps.package.outputs.archive_upload }}
            ${{ steps.package.outputs.archive_checksum_upload }}

  publish-release:
    name: Publish GitHub Release Assets
    needs:
      - build-native-assets
    runs-on: ubuntu-latest
    steps:
      - name: Download packaged assets
        uses: actions/download-artifact@v4
        with:
          path: release-assets
          pattern: native-release-*
          merge-multiple: true

      - name: Create or update release
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
        shell: bash
        run: |
          set -euo pipefail

          tag="${GITHUB_REF_NAME}"
          title="codex-exec-loop-native ${tag}"

          mapfile -t files < <(find release-assets -maxdepth 1 -type f | sort)
          if [[ "${#files[@]}" -eq 0 ]]; then
            echo "No release files were downloaded from the build jobs." >&2
            exit 1
          fi

          if gh release view "${tag}" --repo "${GH_REPO}" >/dev/null 2>&1; then
            gh release upload "${tag}" "${files[@]}" --repo "${GH_REPO}" --clobber
          else
            gh release create "${tag}" "${files[@]}" \
              --repo "${GH_REPO}" \
              --title "${title}" \
              --notes "Automated native/npm release for ${tag}."
          fi

          gh release view "${tag}" --repo "${GH_REPO}" --json url --jq '.url'

  publish-npm:
    name: Publish npm Package
    needs:
      - build-native-assets
      - publish-release
    runs-on: ubuntu-latest
    env:
      NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org

      - name: Check npm publish configuration
        id: npm_config
        shell: bash
        run: |
          set -euo pipefail

          if [[ -z "${NODE_AUTH_TOKEN:-}" ]]; then
            echo "configured=false" >> "${GITHUB_OUTPUT}"
            echo "NPM_TOKEN secret is not configured; skipping npm publish."
            exit 0
          fi

          echo "configured=true" >> "${GITHUB_OUTPUT}"

      - name: Download packaged assets
        if: ${{ steps.npm_config.outputs.configured == 'true' }}
        uses: actions/download-artifact@v4
        with:
          path: release-assets
          pattern: native-release-*
          merge-multiple: true

      - name: Stage npm packages
        if: ${{ steps.npm_config.outputs.configured == 'true' }}
        shell: bash
        run: |
          set -euo pipefail

          node npm/scripts/stage-npm-packages.mjs \
            --release-assets-dir release-assets \
            --out-dir npm/dist/publish \
            --version "${GITHUB_REF_NAME}"

      - name: Publish platform packages
        if: ${{ steps.npm_config.outputs.configured == 'true' }}
        shell: bash
        run: |
          set -euo pipefail

          package_name() {
            node -e 'const fs = require("fs"); const path = require("path"); const pkg = JSON.parse(fs.readFileSync(path.join(process.argv[1], "package.json"), "utf8")); console.log(pkg.name);' "$1"
          }

          package_version() {
            node -e 'const fs = require("fs"); const path = require("path"); const pkg = JSON.parse(fs.readFileSync(path.join(process.argv[1], "package.json"), "utf8")); console.log(pkg.version);' "$1"
          }

          publish_if_missing() {
            local package_dir="$1"
            local name
            local version

            name="$(package_name "${package_dir}")"
            version="$(package_version "${package_dir}")"

            if npm view "${name}@${version}" version >/dev/null 2>&1; then
              echo "Skipping ${name}@${version}; version already exists on npm."
              return 0
            fi

            npm publish "${package_dir}" --access public
          }

          publish_if_missing "npm/dist/publish/platforms/@refinedstone/akra-linux-x64"
          publish_if_missing "npm/dist/publish/platforms/@refinedstone/akra-darwin-arm64"
          publish_if_missing "npm/dist/publish/platforms/@refinedstone/akra-win32-x64"

      - name: Publish main package
        if: ${{ steps.npm_config.outputs.configured == 'true' }}
        shell: bash
        run: |
          set -euo pipefail

          package_dir="npm/dist/publish/main"
          package_name="$(node -e 'const fs = require("fs"); const path = require("path"); const pkg = JSON.parse(fs.readFileSync(path.join(process.argv[1], "package.json"), "utf8")); console.log(pkg.name);' "${package_dir}")"
          package_version="$(node -e 'const fs = require("fs"); const path = require("path"); const pkg = JSON.parse(fs.readFileSync(path.join(process.argv[1], "package.json"), "utf8")); console.log(pkg.version);' "${package_dir}")"

          if npm view "${package_name}@${package_version}" version >/dev/null 2>&1; then
            echo "Skipping ${package_name}@${package_version}; version already exists on npm."
            exit 0
          fi

          npm publish "${package_dir}" --access public
