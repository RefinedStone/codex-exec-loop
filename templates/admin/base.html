<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{{ page_title }} | Planning Admin</title>
    <meta name="csrf-token" content="{{ csrf_token }}">
    <style>
      :root {
        --bg: #f2efe8;
        --panel: rgba(255, 255, 255, 0.84);
        --panel-strong: rgba(255, 255, 255, 0.96);
        --ink: #202226;
        --muted: #606770;
        --line: rgba(32, 34, 38, 0.12);
        --accent: #0b6a53;
        --accent-soft: rgba(11, 106, 83, 0.12);
        --warn: #9b4d11;
        --error: #a32424;
      }
      * { box-sizing: border-box; }
      body {
        margin: 0;
        font-family: "IBM Plex Sans", "Segoe UI", sans-serif;
        color: var(--ink);
        background:
          radial-gradient(circle at top left, rgba(11, 106, 83, 0.18), transparent 32rem),
          linear-gradient(180deg, #f8f5ef 0%, #ece6db 100%);
      }
      a { color: inherit; }
      .shell {
        max-width: 1360px;
        margin: 0 auto;
        padding: 24px;
      }
      .hero {
        display: grid;
        gap: 12px;
        padding: 20px 24px;
        background: linear-gradient(135deg, rgba(255,255,255,0.92), rgba(255,255,255,0.72));
        border: 1px solid var(--line);
        border-radius: 24px;
        box-shadow: 0 24px 60px rgba(32, 34, 38, 0.08);
      }
      .eyebrow {
        font-size: 12px;
        letter-spacing: 0.12em;
        text-transform: uppercase;
        color: var(--muted);
      }
      .headline {
        font-size: clamp(28px, 4vw, 44px);
        line-height: 1.02;
        margin: 0;
      }
      .subhead {
        margin: 0;
        color: var(--muted);
        max-width: 72ch;
      }
      .nav {
        display: flex;
        flex-wrap: wrap;
        gap: 10px;
        margin: 18px 0 24px;
      }
      .nav a {
        padding: 10px 14px;
        border-radius: 999px;
        border: 1px solid var(--line);
        background: rgba(255, 255, 255, 0.68);
        text-decoration: none;
      }
      .nav a.active {
        background: var(--accent);
        color: white;
        border-color: transparent;
      }
      .notice {
        margin: 18px 0;
        padding: 12px 14px;
        border-radius: 16px;
        background: var(--accent-soft);
        border: 1px solid rgba(11, 106, 83, 0.18);
      }
      .grid {
        display: grid;
        gap: 18px;
        grid-template-columns: repeat(12, minmax(0, 1fr));
      }
      .card {
        grid-column: span 12;
        background: var(--panel);
        border: 1px solid var(--line);
        border-radius: 20px;
        padding: 18px;
        backdrop-filter: blur(14px);
      }
      .card h2, .card h3 {
        margin-top: 0;
      }
      .span-4 { grid-column: span 4; }
      .span-5 { grid-column: span 5; }
      .span-6 { grid-column: span 6; }
      .span-7 { grid-column: span 7; }
      .span-8 { grid-column: span 8; }
      .span-12 { grid-column: span 12; }
      .statline {
        display: flex;
        flex-wrap: wrap;
        gap: 10px;
        margin-top: 12px;
      }
      .pill {
        padding: 7px 10px;
        border-radius: 999px;
        background: rgba(255,255,255,0.74);
        border: 1px solid var(--line);
        font-size: 13px;
      }
      .mono, textarea, code, pre {
        font-family: "IBM Plex Mono", "SFMono-Regular", monospace;
      }
      .actions, .inline-actions {
        display: flex;
        flex-wrap: wrap;
        gap: 10px;
      }
      button, .button {
        appearance: none;
        border: none;
        border-radius: 14px;
        background: var(--ink);
        color: white;
        padding: 10px 14px;
        font: inherit;
        cursor: pointer;
        text-decoration: none;
      }
      button.secondary, .button.secondary {
        background: rgba(255,255,255,0.92);
        color: var(--ink);
        border: 1px solid var(--line);
      }
      button.warn {
        background: var(--warn);
      }
      button.error {
        background: var(--error);
      }
      form { margin: 0; }
      .stack {
        display: grid;
        gap: 14px;
      }
      .compact-form {
        gap: 8px;
      }
      .form-grid {
        display: grid;
        gap: 12px;
        grid-template-columns: repeat(auto-fit, minmax(12rem, 1fr));
      }
      .field {
        display: grid;
        gap: 8px;
      }
      .field label {
        font-weight: 600;
      }
      textarea, select, input[type="text"], input[type="search"] {
        width: 100%;
        border: 1px solid var(--line);
        border-radius: 14px;
        padding: 12px;
        background: var(--panel-strong);
        color: var(--ink);
      }
      textarea {
        min-height: 14rem;
        resize: vertical;
      }
      .short-textarea {
        min-height: 5rem;
      }
      table {
        width: 100%;
        border-collapse: collapse;
      }
      th, td {
        padding: 10px 0;
        text-align: left;
        border-bottom: 1px solid var(--line);
        vertical-align: top;
      }
      .issues {
        display: grid;
        gap: 10px;
      }
      .issue {
        padding: 12px;
        border-radius: 14px;
        border: 1px solid var(--line);
        background: rgba(255,255,255,0.8);
      }
      .issue.error { border-color: rgba(163, 36, 36, 0.24); }
      .issue.warning { border-color: rgba(155, 77, 17, 0.24); }
      .issue small { color: var(--muted); display: block; margin-bottom: 6px; }
      @media (max-width: 980px) {
        .span-4, .span-5, .span-6, .span-7, .span-8 { grid-column: span 12; }
        .shell { padding: 14px; }
      }
    </style>
    <script src="https://unpkg.com/htmx.org@2.0.4"></script>
    <script>
      document.addEventListener("htmx:configRequest", function (event) {
        const token = document.querySelector('meta[name="csrf-token"]')?.content;
        if (token) {
          event.detail.headers["X-CSRF-Token"] = token;
        }
      });
    </script>
    <script type="module">
      const editors = [...document.querySelectorAll("textarea[data-editor-textarea]")];
      if (editors.length > 0) {
        try {
          const [{ EditorView, keymap, lineNumbers }, { EditorState }, { defaultKeymap }, { json }, { markdown }] =
            await Promise.all([
              import("https://esm.sh/codemirror@6.0.1"),
              import("https://esm.sh/@codemirror/state@6.4.1"),
              import("https://esm.sh/@codemirror/commands@6.8.1"),
              import("https://esm.sh/@codemirror/lang-json@6.0.1"),
              import("https://esm.sh/@codemirror/lang-markdown@6.3.4")
            ]);
          for (const textarea of editors) {
            const language = textarea.dataset.editorLanguage;
            const extensions = [lineNumbers(), keymap.of(defaultKeymap)];
            if (language === "json") extensions.push(json());
            if (language === "markdown") extensions.push(markdown());
            const state = EditorState.create({ doc: textarea.value, extensions });
            const mount = document.createElement("div");
            textarea.after(mount);
            textarea.style.display = "none";
            const view = new EditorView({
              state,
              parent: mount,
              dispatch(transaction) {
                view.update([transaction]);
                textarea.value = view.state.doc.toString();
              }
            });
            textarea.form?.addEventListener("submit", () => {
              textarea.value = view.state.doc.toString();
            });
          }
        } catch (_error) {
          // Keep the plain textarea fallback when CDN modules are unavailable.
        }
      }
    </script>
  </head>
  <body>
    <div class="shell">
      <header class="hero">
        <div class="eyebrow">Akra Local Admin</div>
        <h1 class="headline">{{ page_title }}</h1>
        <p class="subhead mono">{{ workspace_dir }}</p>
      </header>
      <nav class="nav">
        <a href="/admin" class="{% if current_nav == "dashboard" %}active{% endif %}">Dashboard</a>
        <a href="/admin/directions" class="{% if current_nav == "directions" %}active{% endif %}">Directions</a>
        <a href="/admin/tasks" class="{% if current_nav == "tasks" %}active{% endif %}">Tasks</a>
        <a href="/admin/controls" class="{% if current_nav == "controls" %}active{% endif %}">Controls</a>
      </nav>
      {% if let Some(message) = notice %}
      <div class="notice">{{ message }}</div>
      {% endif %}
      {% block content %}{% endblock %}
    </div>
  </body>
</html>
