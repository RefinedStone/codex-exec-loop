<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{{ page_title }} | Planning Admin</title>
    <meta name="csrf-token" content="{{ csrf_token }}">
    <style>
      :root {
        --bg: #f4f6f8;
        --panel: #ffffff;
        --panel-strong: #ffffff;
        --ink: #171b21;
        --muted: #667085;
        --line: #d7dde5;
        --line-soft: #e8edf3;
        --accent: #0f62fe;
        --accent-soft: #edf4ff;
        --warn: #b45c00;
        --warn-soft: #fff4e5;
        --error: #b42318;
        --error-soft: #fff1f0;
        --success: #0e7c3a;
        --success-soft: #eaf7ee;
      }
      * { box-sizing: border-box; }
      body {
        margin: 0;
        font-family: "IBM Plex Sans", "Segoe UI", sans-serif;
        color: var(--ink);
        background: var(--bg);
      }
      a { color: inherit; }
      .shell {
        max-width: 1440px;
        margin: 0 auto;
        padding: 20px;
      }
      .hero {
        display: flex;
        align-items: end;
        justify-content: space-between;
        gap: 16px;
        padding: 16px 18px;
        background: var(--panel);
        border: 1px solid var(--line);
        border-radius: 8px;
      }
      .eyebrow {
        font-size: 12px;
        letter-spacing: 0.08em;
        text-transform: uppercase;
        color: var(--muted);
      }
      .headline {
        font-size: 24px;
        line-height: 1.15;
        margin: 0;
      }
      .subhead {
        margin: 0;
        color: var(--muted);
        max-width: 72ch;
      }
      .nav {
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
        margin: 14px 0 18px;
      }
      .nav a {
        padding: 8px 12px;
        border-radius: 6px;
        border: 1px solid var(--line);
        background: var(--panel);
        text-decoration: none;
        font-size: 14px;
      }
      .nav a.active {
        background: var(--accent);
        color: white;
        border-color: transparent;
      }
      .notice {
        margin: 18px 0;
        padding: 10px 12px;
        border-radius: 8px;
        background: var(--accent-soft);
        border: 1px solid #c7ddff;
      }
      .grid {
        display: grid;
        gap: 16px;
        grid-template-columns: repeat(12, minmax(0, 1fr));
      }
      .card {
        grid-column: span 12;
        background: var(--panel);
        border: 1px solid var(--line);
        border-radius: 8px;
        padding: 16px;
      }
      .card h2, .card h3 {
        margin-top: 0;
      }
      h2 {
        font-size: 18px;
        margin-bottom: 8px;
      }
      p {
        color: var(--muted);
      }
      .span-4 { grid-column: span 4; }
      .span-5 { grid-column: span 5; }
      .span-6 { grid-column: span 6; }
      .span-7 { grid-column: span 7; }
      .span-8 { grid-column: span 8; }
      .span-12 { grid-column: span 12; }
      .statline {
        display: flex;
        flex-wrap: wrap;
        gap: 10px;
        margin-top: 12px;
      }
      .pill {
        padding: 7px 10px;
        border-radius: 999px;
        background: var(--panel);
        border: 1px solid var(--line);
        font-size: 13px;
      }
      .mono, textarea, code, pre {
        font-family: "IBM Plex Mono", "SFMono-Regular", monospace;
      }
      .actions, .inline-actions {
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
      }
      button, .button {
        appearance: none;
        border: none;
        border-radius: 6px;
        background: var(--ink);
        color: white;
        padding: 9px 12px;
        font: inherit;
        font-size: 14px;
        cursor: pointer;
        text-decoration: none;
      }
      button.secondary, .button.secondary {
        background: var(--panel);
        color: var(--ink);
        border: 1px solid var(--line);
      }
      button.warn {
        background: var(--warn);
      }
      button.error {
        background: var(--error);
      }
      form { margin: 0; }
      .stack {
        display: grid;
        gap: 14px;
      }
      .compact-form {
        gap: 8px;
      }
      .form-grid {
        display: grid;
        gap: 12px;
        grid-template-columns: repeat(auto-fit, minmax(12rem, 1fr));
      }
      .field {
        display: grid;
        gap: 8px;
      }
      .field label {
        font-weight: 600;
      }
      textarea, select, input[type="text"], input[type="search"] {
        width: 100%;
        border: 1px solid var(--line);
        border-radius: 6px;
        padding: 9px 10px;
        background: var(--panel-strong);
        color: var(--ink);
      }
      textarea {
        min-height: 14rem;
        resize: vertical;
      }
      .short-textarea {
        min-height: 5rem;
      }
      .toolbar {
        display: flex;
        justify-content: space-between;
        gap: 12px;
        align-items: start;
        margin-bottom: 16px;
      }
      .create-panel {
        min-width: min(36rem, 100%);
        background: var(--panel);
        border: 1px solid var(--line);
        border-radius: 8px;
      }
      .create-panel summary {
        cursor: pointer;
        padding: 12px 14px;
        font-weight: 700;
      }
      .create-panel form {
        border-top: 1px solid var(--line-soft);
        padding: 14px;
      }
      .metric-row {
        display: grid;
        gap: 12px;
        grid-template-columns: repeat(auto-fit, minmax(12rem, 1fr));
        margin-bottom: 16px;
      }
      .metric {
        background: var(--panel);
        border: 1px solid var(--line);
        border-radius: 8px;
        padding: 12px;
      }
      .metric span {
        display: block;
        color: var(--muted);
        font-size: 12px;
        text-transform: uppercase;
        letter-spacing: 0.06em;
      }
      .metric strong {
        display: block;
        margin-top: 6px;
        font-size: 17px;
      }
      .list-panel {
        background: var(--panel);
        border: 1px solid var(--line);
        border-radius: 8px;
        margin-bottom: 16px;
      }
      .list-header {
        display: flex;
        justify-content: space-between;
        gap: 12px;
        padding: 14px 16px;
        border-bottom: 1px solid var(--line-soft);
      }
      .list-header h2, .list-header p {
        margin: 0;
      }
      .entity-list {
        display: grid;
      }
      .entity-row {
        border-bottom: 1px solid var(--line-soft);
      }
      .entity-row:last-child {
        border-bottom: 0;
      }
      .entity-row summary {
        display: grid;
        grid-template-columns: minmax(14rem, 1fr) minmax(18rem, 1.2fr);
        gap: 12px;
        align-items: center;
        padding: 12px 16px;
        cursor: pointer;
      }
      .entity-row[open] summary {
        background: #f9fbfd;
        border-bottom: 1px solid var(--line-soft);
      }
      .entity-main, .entity-meta {
        display: flex;
        flex-wrap: wrap;
        align-items: center;
        gap: 8px;
      }
      .entity-main {
        min-width: 0;
      }
      .entity-main strong {
        overflow-wrap: anywhere;
      }
      .entity-meta {
        color: var(--muted);
        font-size: 13px;
        justify-content: flex-end;
      }
      .entity-detail {
        padding: 16px;
        background: #fbfcfe;
      }
      .status-pill {
        border-radius: 999px;
        padding: 3px 8px;
        border: 1px solid var(--line);
        color: var(--muted);
        background: var(--panel);
      }
      .status-pill.active, .status-pill.ready, .status-pill.in_progress {
        color: var(--success);
        background: var(--success-soft);
        border-color: #b7e2c5;
      }
      .status-pill.paused, .status-pill.blocked, .status-pill.awaiting_user, .status-pill.proposed {
        color: var(--warn);
        background: var(--warn-soft);
        border-color: #ffd8a8;
      }
      .status-pill.done, .status-pill.cancelled {
        color: var(--muted);
        background: #eef1f4;
      }
      .danger-zone {
        margin-top: 12px;
        padding-top: 12px;
        border-top: 1px solid var(--line-soft);
      }
      .empty-state {
        padding: 16px;
      }
      .error-notice {
        background: var(--error-soft);
        border-color: #ffd0cc;
      }
      table {
        width: 100%;
        border-collapse: collapse;
      }
      th, td {
        padding: 10px 0;
        text-align: left;
        border-bottom: 1px solid var(--line);
        vertical-align: top;
      }
      .issues {
        display: grid;
        gap: 10px;
      }
      .issue {
        padding: 12px;
        border-radius: 14px;
        border: 1px solid var(--line);
        background: rgba(255,255,255,0.8);
      }
      .issue.error { border-color: rgba(163, 36, 36, 0.24); }
      .issue.warning { border-color: rgba(155, 77, 17, 0.24); }
      .issue small { color: var(--muted); display: block; margin-bottom: 6px; }
      @media (max-width: 980px) {
        .span-4, .span-5, .span-6, .span-7, .span-8 { grid-column: span 12; }
        .shell { padding: 14px; }
        .toolbar { display: grid; }
        .entity-row summary {
          grid-template-columns: 1fr;
        }
        .entity-meta {
          justify-content: flex-start;
        }
      }
    </style>
    <script src="https://unpkg.com/htmx.org@2.0.4"></script>
    <script>
      document.addEventListener("htmx:configRequest", function (event) {
        const token = document.querySelector('meta[name="csrf-token"]')?.content;
        if (token) {
          event.detail.headers["X-CSRF-Token"] = token;
        }
      });
    </script>
    <script type="module">
      const editors = [...document.querySelectorAll("textarea[data-editor-textarea]")];
      if (editors.length > 0) {
        try {
          const [{ EditorView, keymap, lineNumbers }, { EditorState }, { defaultKeymap }, { json }, { markdown }] =
            await Promise.all([
              import("https://esm.sh/codemirror@6.0.1"),
              import("https://esm.sh/@codemirror/state@6.4.1"),
              import("https://esm.sh/@codemirror/commands@6.8.1"),
              import("https://esm.sh/@codemirror/lang-json@6.0.1"),
              import("https://esm.sh/@codemirror/lang-markdown@6.3.4")
            ]);
          for (const textarea of editors) {
            const language = textarea.dataset.editorLanguage;
            const extensions = [lineNumbers(), keymap.of(defaultKeymap)];
            if (language === "json") extensions.push(json());
            if (language === "markdown") extensions.push(markdown());
            const state = EditorState.create({ doc: textarea.value, extensions });
            const mount = document.createElement("div");
            textarea.after(mount);
            textarea.style.display = "none";
            const view = new EditorView({
              state,
              parent: mount,
              dispatch(transaction) {
                view.update([transaction]);
                textarea.value = view.state.doc.toString();
              }
            });
            textarea.form?.addEventListener("submit", () => {
              textarea.value = view.state.doc.toString();
            });
          }
        } catch (_error) {
          // Keep the plain textarea fallback when CDN modules are unavailable.
        }
      }
    </script>
  </head>
  <body>
    <div class="shell">
      <header class="hero">
        <div class="eyebrow">Akra Local Admin</div>
        <h1 class="headline">{{ page_title }}</h1>
        <p class="subhead mono">{{ workspace_dir }}</p>
      </header>
      <nav class="nav">
        <a href="/admin" class="{% if current_nav == "dashboard" %}active{% endif %}">Dashboard</a>
        <a href="/admin/directions" class="{% if current_nav == "directions" %}active{% endif %}">Directions</a>
        <a href="/admin/tasks" class="{% if current_nav == "tasks" %}active{% endif %}">Tasks</a>
        <a href="/admin/controls" class="{% if current_nav == "controls" %}active{% endif %}">Controls</a>
      </nav>
      {% if let Some(message) = notice %}
      <div class="notice">{{ message }}</div>
      {% endif %}
      {% block content %}{% endblock %}
    </div>
  </body>
</html>
