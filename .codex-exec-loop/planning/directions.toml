version = 1

[queue_idle]
policy = "review_and_enqueue"
prompt_path = ".codex-exec-loop/planning/prompts/queue-idle-review.md"

[[directions]]
id = "context-first-architecture-and-doc-coherence"
title = "Context-first architecture and doc coherence"
summary = "Refine architecture boundaries, documentation entrypoints, and operator vocabulary so one flow can be understood with minimal local context."
success_criteria = [
    "A single operator flow can be traced from one roadmap doc into a small code cluster without scanning unrelated infrastructure or historical notes.",
    "README, docs/README, queue-idle review guidance, and planning vocabulary all use the same terms for directions, queue tasks, proposals, accepted planning, and repair.",
    "Mixed-responsibility hotspots have an agreed split order and capability-boundary target before deeper refactor work starts.",
]
scope_hints = [
    "Start with repo entrypoints, vocabulary alignment, and explicit hotspot ordering before large code movement.",
    "Prefer smaller, capability-shaped boundaries over provider-wide abstractions or aesthetic-only reshuffles.",
    "Keep docs/design as shipped truth; put future refactor intent and research in docs/plan until behavior actually changes.",
]
detail_doc_path = ".codex-exec-loop/planning/directions/context-first-architecture-and-doc-coherence.md"
state = "active"

[[directions]]
id = "terminal-agent-bridge-research-and-capability-boundary"
title = "Terminal agent bridge research and capability boundary"
summary = "Research elegant ways to attach Akra to non-Codex terminal agents and define the capability boundary before any provider-specific adapter lands."
success_criteria = [
    "Local pre-opened terminal attach, local wrapper, SSH or tunnel, and proxy-style mediation paths are compared with the same rubric.",
    "The roadmap names one primary path and one fallback path for Claude Code class integrations, with explicit reasons for deferring the rest.",
    "Codex-specific assumptions are translated into capability targets such as InteractiveTurnRuntime, StartupProbe, SessionCatalog, and TerminalBridgeAttachment.",
]
scope_hints = [
    "Treat this direction as research-first until the boundary and operator model are credible enough to spike safely.",
    "Do not assume Claude or other terminal agents expose the same session or thread API as codex app-server.",
    "Prefer local terminal attachment paths before remote transport or proxy infrastructure unless research proves otherwise.",
]
detail_doc_path = ".codex-exec-loop/planning/directions/terminal-agent-bridge-research-and-capability-boundary.md"
state = "active"
