version = 1

[queue_idle]
policy = "review_and_enqueue"
prompt_path = ".codex-exec-loop/planning/prompts/queue-idle-review.md"

[[directions]]
id = "operator-state-language"
title = "Operator-facing state language"
summary = "Unify shell, planning, queue, automation, and resume status around one operator-facing vocabulary built from current state, cause, and next action."
success_criteria = [
    "The operator can tell whether the system is ready, waiting, running, paused, blocked, or repairing from any primary surface without translating internal jargon.",
    "Status copy names both the cause and the next action whenever work cannot proceed normally.",
    "Shell summaries, planning recovery, queue inspection, automation controls, and resumed-session copy use the same state vocabulary.",
]
scope_hints = [
    "Start with shared status projection and compact shell copy before changing behavior.",
    "Prefer wording and projection seams over automation policy changes in the same slice.",
    "Treat resumed-session text as part of the same state language, not a separate feature.",
]
detail_doc_path = ".codex-exec-loop/planning/directions/operator-state-language.md"
state = "active"

[[directions]]
id = "queue-workboard-projection"
title = "Queue workboard projection"
summary = "Make queue inspection read like a work board with now, next, proposed, and blocked sections instead of mixed queue, proposal, and planner-note fragments."
success_criteria = [
    "Queue inspection shows one current executable item, near-future queued work, promotable proposals, and blocked or skipped work as separate sections.",
    "Queue summary lines align with the now, next, proposed, and blocked framing used in resumed-session and shell surfaces.",
    "Blocked or skipped items surface as operator-readable work framing instead of hidden planner residue.",
]
scope_hints = [
    "Rework the queue overlay information architecture before adding new queue behavior.",
    "Keep one actionable queue head and treat alternates as next work or proposals, not duplicate active items.",
    "Prefer the shared queue framing projection over one-off overlay copy.",
]
detail_doc_path = ".codex-exec-loop/planning/directions/queue-workboard-projection.md"
state = "active"

[[directions]]
id = "automation-recovery-language"
title = "Automation recovery language"
summary = "Turn automation controls into a recovery surface that explains whether automation continued, paused, or stopped, why, and which action resumes progress."
success_criteria = [
    "Automation surfaces show policy, preview, pause or stop reason, and recovery path without planner jargon.",
    "Repeated queue head, invalid planning, queue-idle policy, and plan-off states read as recoverable operator states.",
    "The automation surface points to one primary action or surface when continuation is blocked.",
]
scope_hints = [
    "Improve pause and stop explanation before adding more automation capability.",
    "Keep planner debug detail secondary to operator recovery copy.",
    "Reuse the shared state vocabulary instead of inventing automation-only terms.",
]
detail_doc_path = ".codex-exec-loop/planning/directions/automation-recovery-language.md"
state = "active"

[[directions]]
id = "planning-entry-ergonomics"
title = "Planning entry ergonomics"
summary = "Make planning entry low ceremony by treating simple mode as the default path, quieting disabled guided branches, and keeping setup and recovery language predictable."
success_criteria = [
    "Simple mode is the obvious fastest path to the first accepted planning workspace and first queue-driven continuation.",
    "First-run and re-entry copy emphasize what becomes active and what action promotes it instead of foregrounding internal planning mechanics.",
    "Disabled guided paths do not dominate the default planning entry flow.",
]
scope_hints = [
    "Focus on simple-mode review, promotion, and entry copy before redesigning already shipped command families.",
    "Treat `akra` and `:` lifecycle commands as fixed entry and recovery affordances that should read consistently with simple mode.",
    "Keep the accepted planning contract explicit even while reducing visible ceremony.",
]
detail_doc_path = ".codex-exec-loop/planning/directions/planning-entry-ergonomics.md"
state = "active"

[[directions]]
id = "architecture-boundaries"
title = "Architecture boundaries for operator UX"
summary = "Reduce shell and planning hotspots only when the extracted seam makes operator-facing status, queue, automation, or planning-entry changes easier to ship safely."
success_criteria = [
    "Status projection can change without repeatedly editing unrelated layout and runtime plumbing.",
    "Queue, automation, planning-entry, and session-state surfaces can evolve in smaller reviewable slices.",
    "Current hotspot files shrink or split along operator-visible boundaries instead of incidental code ownership.",
]
scope_hints = [
    "Prefer extractions that directly unblock the first four active directions.",
    "Use operator-visible seams such as status projection, queue framing, and planning entry flow as the split boundary.",
    "Keep refactors small enough that they can land as support work for visible UX slices.",
]
detail_doc_path = ".codex-exec-loop/planning/directions/architecture-boundaries.md"
state = "active"
